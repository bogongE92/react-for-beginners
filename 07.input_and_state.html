<!DOCTYPE html>
<html>
    <body>
		<div id="root"></div>
	</body>

	<script src="https://unpkg.com/react@17.0.2/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	
    
	<script type="text/babel">
		/* 
			처음엔 분 -> 시간 변환.
			Minutes라고 되어있는 input에 분을 쓰면 시가 갱신이 될것이다. 
			Hours되어있는 부분에 시간을 쓰면 분 단위가 갱신 될 것이다. 

			react 에서는 JSX에서는 HTML 문법을 그대로 사용하면 오류가 생기니깐
			그에 맞는 문법을 사용해야 한다. 
			for -> htmlFor
			class -> className

			useState는 array를 제공하고, 그 첫번째 element가 현재의 값이 된다. 

			그냥 event를 하면 react event와 javascript event와 다르다.
			그냥 event를 하면 SyntheticBaseEvent (합성 이벤트)라는것이 뜨는데 react js거 가짜 event를 발생시킨다. 
			여기서 원래 event를 알고싶다면 nativeEvent를 보면된다. 
			nativeEvent 이건 javascript event이다. 
			그리고 중요한건 target이고, 우리가 원하는건 이것의 value값이니깐 
			target의 value값으로 해당 값을 구할 수 있다. 

			데이터를 업데이터를 업데이트 하는 방법은 setState 함수를 사용하는 거다. 
		*/

		const App = () => {
			const [minutes, setMinutes] = React.useState();
			const onChange = (e) => {
				//console.log(e.target.value);
				setMinutes(e.target.value);
			}
			return (
				<div id="container">
					<h3 className="title">Super Converter :</h3>
					<label htmlFor="minutes">Minutes</label>
					<input 
						id="minutes" 
						type="number" 
						placeholder="Minutes" 
						value={minutes} 
						onChange={onChange}
					/>
					<h3>you want to convert {minutes}</h3>
					<label htmlFor="hours">Hours</label>
					<input id="hours" type="number " placeholder="Hours"/>
				</div>
			)
		};
		
		const root = document.getElementById("root");
		ReactDOM.render( <App />, root);
	</script>
</html>
