<!DOCTYPE html>
<html>
    <body>
		<div id="root"></div>
	</body>

	<script src="https://unpkg.com/react@17.0.2/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	
    
	<script type="text/babel">
		/* 
			onChange 함수는 데이터를 업데이트 해주는 역할을 하고, 
			input은 스스로 업데이트를 한다. 
			즉 사용자가 input에 뭔가를 써넣었을때 change이벤트가 일어나고 onChange함수가 실행된다.
			e.target.value를 얻게 되는데 이게 바로 input value 이다. 
			input의 value를 연결시켜주는 이유는 input을 외부에서도 수정해주기 위해서이다. 
			예를들어 reset 버튼을 누른다고 해보면, 그안의 input 내용을 다 지울수 있는 것처럼 말이다. 
			onChange함수의 주요 포인트는 업데이터를 해주는 것이다. 
			만약 내가 onChange를 삭제한다 하더라도 state에 연결된 input값은 남겨져 있다. 
			그래서 onChange를 삭제하면 업데이트만 안될뿐이지 value에는 남아있지만 업데이트를 해주기위해서는 두개다 필요하다.
			그래서 event가 발생했을때 값을 업데이트 해주고, ui에 보여주는거 하나
		*/

		const App = () => {
			const [minutes, setMinutes] = React.useState("");
			const onChange = (e) => {
				//console.log(e.target.value);
				setMinutes(e.target.value);
			}
			
			const reset = () => {
				setMinutes("");
			}
			return (
				<div id="container">
					<h3 className="title">Super Converter :</h3>
					<div>
						<label htmlFor="minutes">Minutes</label>
						<input 
							value={minutes} 
							id="minutes" 
							type="number" 
							placeholder="Minutes" 
							onChange={onChange}
						/>
					</div>

					<div>
						<label htmlFor="hours">Hours</label>
						<input 
							value={Math.round( minutes/ 60)}  
							id="hours" 
							type="number" 
							placeholder="Hours"
							disabled
						/>
					</div>
					<button onClick={reset}>Reset</button>
				</div>
			)
		};
		
		const root = document.getElementById("root");
		ReactDOM.render( <App />, root);
	</script>
</html>
