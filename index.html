<!DOCTYPE html>
<html>
    <body>
		<div id="root"></div>
	</body>

	<script src="https://unpkg.com/react@17.0.2/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	
    
	<script type="text/babel">
		// react 에서 js문법은 그냥 사용하면 안되고, {} 안에 사용해줘야 한다. 
		// props는 부모컴포넌트로부터 자식 컴포넌트에 데이터를 보낼 수 있게 해주는 방법이다. 
		// 아래를 보면 부모컴포넌트는 app
		// 자식컴포넌트는 MinutesToHours 또는 KmToMiles 이게 된다. 
		// 그래서 해야할 것은 부모컴포넌트(APP)로부터 자식컴포넌트로 테이터를 보내는 것이다

		function SaveBtn(){
			return (
				<button 
					style={{}}
				>
					Save Change
				</button>

			);
		}

		function ConfirmBtn(){
			return <button>Confirm</button>;
		}

		const App = () => {
			return (
				<div>
					<SaveBtn />
					<ConfirmBtn />
				</div>
			)
		};
		
		const root = document.getElementById("root");
		ReactDOM.render( <App />, root);
	</script>
</html>
