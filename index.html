<!DOCTYPE html>
<html>
    <body>
		<div id="root"></div>
	</body>

	<script src="https://unpkg.com/react@17.0.2/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	<style>
		.contents{
			padding: 0;
			margin: 0;
			list-style: 0;
		}
		h5{
			margin: 8px 0 5px;
		}
	</style>
	
    
	<script type="text/babel">
		// react 에서 js문법은 그냥 사용하면 안되고, {} 안에 사용해줘야 한다. 

		const MinutesToHours = () => {
			const [amount, setAmount] = React.useState("");
			const [inverted, setInverted] = React.useState(false);
			const onChange = (e) => {
				//console.log(e.target.value);
				setAmount(e.target.value);
			}
			
			const reset = () => setAmount("");

			const oninvert = () => {
				// reset();
				setInverted( (current) => !current);  // inverted가 false로 오면 true로 반환하고, true로 오면 false로 반환해준다. 
			}
			return (
				<div>
					<h5>Minutes To Hours</h5>
					<ul className="contents">
						<li>
							<label htmlFor="minutes">Minutes</label>
							<input 
								value={inverted? amount * 60  : amount} 
								id="minutes" 
								type="number" 
								placeholder="Minutes" 
								onChange={onChange}
								disabled={inverted}
							/>
						</li>

						<li>
							<label htmlFor="hours">Hours</label>
							<input 
								value={inverted ? amount : Math.round( amount/ 60)}
								id="hours" 
								type="number" 
								placeholder="Hours"
								onChange={onChange}
								disabled={!inverted}
							/>
						</li>
					</ul>
					<button onClick={reset}>Reset</button>
					<button onClick={oninvert}>invert</button>
				</div>
			)
		};
		
		const KmToMiles = () => {
			const [length, setLength] = React.useState("");
			const [inverted, setInverted] = React.useState(false);
			const onChange = (e) => {
				console.log(e.target.value)
				setLength(e.target.value);
			}

			const reset = () => setLength("");
			const oninvert = () => {
				setInverted( (current) => !current );
			}

			return (
				<div>
					<h5>Km to Miles</h5>
					<ul className="contents">
						<li>
							<label htmlFor="km">Km</label>
							<input 
								value={inverted? length * 1.609  : length  }
								id="km"
								placeholder="Km"
								type="number" 
								onChange={onChange}
								disabled={inverted}
							/>
						</li>
						<li>
							<label htmlFor="miles">Miles</label>
							<input 
								value={inverted? length  :  length / 1.609 }
								id="miles"
								placeholder="Miles"
								type="number" 
								onChange={onChange}
								disabled={!inverted}
							/>
						</li>
					</ul>
					<button onClick={reset}>Reset</button>
					<button onClick={oninvert}>invert</button>
				</div>
			)
		};

		const App = () => {
			const [index, setIndex] = React.useState("0");
			// 첫번째 item은 index, 이부분은 item 순서가 중요한거고, 이름이 중요한부분이 아님
			// 첫번째 item(index)은 데이터가 될것이고, setIndex 이건 그 데이터를 수정하는 함수가 될 것이다. 
			const onSelect = (e) => {
				console.log(e.target.value);
				setIndex(e.target.value);
			}

			return (
				<div id="container">
					<h3 className="title">Super Converter</h3>
					<select value={index} onChange={onSelect}>
						<option value="0">옵션 선택</option>	
						<option value="1">Minutes & Hours</option>	
						<option value="2">Km & Miles</option>	
					</select>
					<div>
						{index === "0" ? "Please select your units" : null } 
						{index === "1" ? <MinutesToHours/> : null } 
						{index === "2" ? <KmToMiles/> : null }
					</div>
				</div>
			)
		};
		
		const root = document.getElementById("root");
		ReactDOM.render( <App />, root);
	</script>
</html>
