<!DOCTYPE html>
<html>
    <body>
		<div id="root"></div>
	</body>

	<script src="https://unpkg.com/react@17.0.2/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	
    
	<script type="text/babel">
		/* 
			filped는 단순히 true혹은 false인 변수
			flip버튼을 누르면 onFlip 함수가 실행되는데 
			setFilpped(current) => !current);onFlip현재 값을 받아서 그 반대의 값을 내놓는다. 
			만약 현재값이 true면 결과로 false를 내놓을 거고, false로 오면 true로 반환한다. 
			flip인 state를 가지고 input을 diabled 할건지 enabled할 건지 결정할 수 있다. 
			disabled={filpped === true} 이렇게 사용하는건 자바스크립트소스이다.
			따라서 disabled={filpped} 이런식으로 사용할 수도 있다. 

			filpped ? minutes : Math.round( minutes/ 60)
			삼항연산자로 true 일때 출력되는 값을 써준다. 
		*/

		const App = () => {
			const [amount, setAmount] = React.useState("");
			const [filpped, setFilpped] = React.useState(false);
			const onChange = (e) => {
				//console.log(e.target.value);
				setAmount(e.target.value);
			}
			
			const reset = () => setAmount("");

			const onFilp = () => {
				// reset();
				setFilpped( (current) => !current);  // filpped가 false로 오면 true로 반환하고, true로 오면 false로 반환해준다. 
			}
			return (
				<div id="container">
					<h3 className="title">Super Converter :</h3>
					<div>
						<label htmlFor="minutes">Minutes</label>
						<input 
							value={filpped? amount * 60  : amount} 
							id="minutes" 
							type="number" 
							placeholder="Minutes" 
							onChange={onChange}
							disabled={filpped}
						/>
					</div>

					<div>
						<label htmlFor="hours">Hours</label>
						<input 
							value={filpped ? amount : Math.round( amount/ 60)}
							id="hours" 
							type="number" 
							placeholder="Hours"
							onChange={onChange}
							disabled={!filpped}
						/>
					</div>
					<button onClick={reset}>Reset</button>
					<button onClick={onFilp}>Filp</button>
				</div>
			)
		};
		
		const root = document.getElementById("root");
		ReactDOM.render( <App />, root);
	</script>
</html>
