<!DOCTYPE html>
<html>
    <body>
		<div id="root"></div>
	</body>

	<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
	<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	
    
	<script type="text/babel">
		/* 
			//  state 는 기본적으로 데이터가 저장되는 곳이다.
			// 리액트는 다른(변경된) 부분만 찾아서 렌더링 해준다.
			// 이제는 사용자들의 INPUT을 어떻게 얻는지, 
			// FORM을 만들었을때 STATE는 어떤식으로 작용하는지에 대해 알아보자.
		*/
		const root = document.getElementById("root");

		const App = () => {
			const [counter, setCounter] = React.useState(0); 
			const onClick = () => {
				// counter + 1 이 방법은 이전 값을 이용해서 현재 값을 계산해 내늩 건데, 이전값을 바탕으로 현재 값을 설정하고 싶다면 
				// setCounter에 함수를 넣어서 만들어 줄 수 있다. 
				// setCounter( counter + 1);
				setCounter( (current) => current +1 );
				// 이 함수의 첫번째 argument는 현재 값이고, 이 함수의 return값이 새로운 state가 되는거지.
				// setCounter( counter + 1); 이렇게 쓰는것보다 setCounter( current => current +1 );이렇게 함수로 사용하는 것이
				// current가 확실히 현재 값이라는걸 보장 하고 있다. 
			};
			console.log("rendered");
			console.log(counter);

			return (
				<div id="container">
					<h3>총 클릭 수 : {counter}</h3>
					<button id="btn"  onClick={ onClick }>Click me</button>
				</div>
			)
		};
		
		
		ReactDOM.render( <App />, root);
	</script>
</html>
